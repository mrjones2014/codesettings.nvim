name: Run All Checks
on:
  push:
    branches: [master]
  pull_request:
jobs:
  run-checks:
    name: Run Checks (${{ matrix.neovim }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.neovim == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - neovim: stable
            shell: ci
          - neovim: nightly
            shell: ci-nightly
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
      - name: Run all checks
        run: nix develop .#${{ matrix.shell }} --accept-flake-config --command just check
      - name: Open issue on nightly failure
        if: failure() && matrix.neovim == 'nightly'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list --label "ci:nightly" --state open --limit 1 --json number -q '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" \
              --body "Still failing as of ${{ github.sha }}: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            gh issue create \
              --title "Neovim nightly CI failure" \
              --label "nvim-nightly" \
              --body "$(cat <<'EOF'
          ## Neovim Nightly CI Failure

          The nightly CI job failed on ${{ github.sha }}.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please investigate whether this is a Neovim regression or a bug in codesettings.nvim.
          EOF
          )"
          fi
