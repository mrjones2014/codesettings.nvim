name: Run All Checks
on:
  push:
    branches: [master]
  pull_request:
jobs:
  checks:
    name: Flake Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - run: nix flake check --accept-flake-config
  tests-stable:
    name: Tests (neovim stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - run: nix develop .#ci --accept-flake-config --command just test
  tests-nightly:
    name: Tests (neovim nightly)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - run: nix develop .#ci-nightly --accept-flake-config --command just test
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list --label "nvim-nightly" --state open --limit 1 --json number -q '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" \
              --body "Still failing as of ${{ github.sha }}: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            gh issue create \
              --title "Neovim nightly CI failure" \
              --label "nvim-nightly" \
              --body "$(cat <<'EOF'
          ## Neovim Nightly CI Failure

          The nightly CI job failed on ${{ github.sha }}.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please investigate whether this is a Neovim regression or a bug in codesettings.nvim.
          EOF
          )"
          fi
